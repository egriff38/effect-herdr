name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  typecheck-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install herdr
        run: curl -fsSL https://herdr.dev/install.sh | sh
      - run: bun install --frozen-lockfile
      - run: bun run test:e2e
